[mt5]
# Path to MT5 terminal (optional — auto-detects if not set)
# terminal_path = "C:\\Program Files\\MetaTrader 5\\terminal64.exe"

[xtb]
email = ""
password = ""
account_type = "demo"  # "real" or "demo"

[bridge]
pairs = ["EURUSD", "USDCAD", "GBPCHF", "AUDUSD", "EURAUD", "GBPUSD"]
lot_ratio = 0.5
poll_interval_ms = 500
reverse_mode = false

[symbols]
# MT5 symbol = XTB symbol
EURUSD = "EURUSD"
USDCAD = "USDCAD"
GBPCHF = "GBPCHF"
AUDUSD = "AUDUSD"
EURAUD = "EURAUD"
GBPUSD = "GBPUSD"
